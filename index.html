<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Farmers' Clear View Adventure</title>
    <style>
        :root {
            --cell-size: 100px;
            --p1-color: #ff4757;
            --p2-color: #2e86de;
            --p1-hair: #4b2c20;
            --p1-shirt: #2e86de;
            --p2-hair: #e67e22;
            --p2-shirt: #27ae60;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fdf6e3;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            overflow-x: hidden;
        }
        .status-header { margin: 20px; text-align: center; }
        .turn-indicator {
            font-size: 1.8rem;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 50px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            margin-top: 10px;
        }
        .p1-turn { background: var(--p1-color); }
        .p2-turn { background: var(--p2-color); }
        .board-wrapper {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 5px solid #d1d8e0;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(7, var(--cell-size));
            grid-template-rows: repeat(5, var(--cell-size));
            gap: 10px;
        }
        .cell {
            background: #fff;
            border: 2px solid #f1f2f6;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            position: relative;
            text-align: center;
        }
        .type-start { background: #70a1ff; color: white; }
        .type-finish { background: #ffa502; color: white; }
        .type-action { background: #ffeaa7; color: #d35400; }
        .cell .icon { font-size: 2.3rem; margin-bottom: 3px; z-index: 1; }
        .center-box {
            grid-column: 2 / 7;
            grid-row: 2 / 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #ff6b6b;
            font-weight: 900;
            pointer-events: none;
        }
        .token {
            position: absolute; 
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; 
            align-items: center; 
            justify-content: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            pointer-events: none;
        }
        .controls { margin: 30px; display: flex; gap: 20px; align-items: center; }
        button {
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; border: none; border-radius: 15px;
            background: #2ed573; color: white; box-shadow: 0 6px #26af5f;
        }
        button:active { transform: translateY(3px); box-shadow: 0 3px #26af5f; }
        #dice-result {
            width: 80px; height: 80px; background: white;
            border: 4px solid #2f3542; border-radius: 20px;
            font-size: 3rem; display: flex; align-items: center; justify-content: center;
        }
        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
            color: #fff; animation: fadeIn 0.5s ease;
        }
        #win-overlay h2 { font-size: 4.5rem; margin: 0; color: #f1c40f; text-align: center; }
        .confetti {
            position: absolute; width: 10px; height: 10px;
            animation: fall 3s linear infinite;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

<div class="status-header">
    <h1>🏆 Farmers' Clear View Adventure!</h1>
    <div id="turn-card" class="turn-indicator p1-turn">Player 1's Turn</div>
</div>

<div class="board-wrapper">
    <div id="game-board">
        <!-- 玩家 1 農夫 (藍衣棕髮) -->
        <div id="p1-token" class="token">
            <svg viewBox="0 0 100 100" width="38" height="38">
                <path d="M30,90 Q50,75 70,90 L75,100 L25,100 Z" fill="var(--p1-shirt)" />
                <circle cx="50" cy="50" r="25" fill="#ffe0bd" />
                <path d="M25,50 Q25,25 50,25 Q75,25 75,50 Q75,40 50,40 Q25,40 25,50" fill="var(--p1-hair)" />
                <path d="M20,40 L80,40 L90,50 L10,50 Z" fill="#f1c40f" />
                <path d="M35,40 L35,25 Q50,20 65,25 L65,40" fill="#f1c40f" />
                <circle cx="42" cy="52" r="3" fill="#333" />
                <circle cx="58" cy="52" r="3" fill="#333" />
            </svg>
        </div>
        <!-- 玩家 2 農夫 (綠衣橘髮) -->
        <div id="p2-token" class="token">
            <svg viewBox="0 0 100 100" width="38" height="38">
                <path d="M30,90 Q50,75 70,90 L75,100 L25,100 Z" fill="var(--p2-shirt)" />
                <circle cx="50" cy="50" r="25" fill="#ffd19a" />
                <path d="M20,50 Q20,20 50,20 Q80,20 80,50 Q80,35 50,35 Q20,35 20,50" fill="var(--p2-hair)" />
                <path d="M15,45 L85,45 L95,55 L5,55 Z" fill="#d35400" />
                <path d="M35,45 L35,30 Q50,25 65,30 L65,45" fill="#d35400" />
                <circle cx="42" cy="52" r="3" fill="#333" />
                <circle cx="58" cy="52" r="3" fill="#333" />
            </svg>
        </div>
        <div class="center-box">
            Can you see the...?
            <div style="font-size: 1.2rem; color: #57606f;">Yes, I can. / No, I can't.</div>
        </div>
    </div>
</div>

<div class="controls">
    <button id="roll-btn" onclick="playGame()">🎲 ROLL DICE</button>
    <div id="dice-result">?</div>
    <button onclick="resetGame()" style="background:#747d8c; box-shadow:0 6px #57606f;">Reset</button>
</div>

<div id="win-overlay">
    <h2 id="winner-name">PLAYER 1</h2>
    <h2>YOU ARE THE WINNER!</h2>
    <p>🎉 Excellent Performance! 🎉</p>
    <button onclick="closeWin()" style="margin-top:20px; background:#f1c40f; color:#000;">Play Again</button>
</div>

<script>
    const boardItems = [
        { name: "Start", type: "start", icon: "🚩" },
        { name: "Pig", type: "item", icon: "🐷" },
        { name: "Duck", type: "item", icon: "🦆" },
        { name: "Cow", type: "item", icon: "🐮" },
        { name: "Move 1 step", type: "action", icon: "🏃", action: "forward" },
        { name: "Dog", type: "item", icon: "🐶" },
        { name: "Rain", type: "item", icon: "🌧️" }, 
        { name: "Sun", type: "item", icon: "☀️" },
        { name: "1 step back", type: "action", icon: "🔙", action: "back" },
        { name: "Wind", type: "item", icon: "💨" },
        { name: "Rainbow", type: "item", icon: "🌈" },
        { name: "Move 1 step", type: "action", icon: "🏃", action: "forward" },
        { name: "Pig", type: "item", icon: "🐷" },
        { name: "Duck", type: "item", icon: "🦆" },
        { name: "Cow", type: "item", icon: "🐮" },
        { name: "1 step back", type: "action", icon: "🔙", action: "back" },
        { name: "Dog", type: "item", icon: "🐶" },
        { name: "Rain", type: "item", icon: "🌧️" },
        { name: "Move 1 step", type: "action", icon: "🏃", action: "forward" },
        { name: "Sun", type: "item", icon: "☀️" },
        { name: "Wind", type: "item", icon: "💨" },
        { name: "Rainbow", type: "item", icon: "🌈" },
        { name: "Pig", type: "item", icon: "🐷" },
        { name: "Finish", type: "finish", icon: "🏆" }
    ];

    // 螺旋路徑座標設定
    const coords = [[4,0],[4,1],[4,2],[4,3],[4,4],[4,5],[4,6],[3,6],[2,6],[1,6],[0,6],[0,5],[0,4],[0,3],[0,2],[0,1],[0,0],[1,0],[2,0],[3,0],[3,1],[3,2],[3,3],[3,4]];
    
    let playerPos = [0, 0];
    let currentPlayer = 0;
    let isMoving = false;

    function init() {
        const board = document.getElementById('game-board');
        boardItems.forEach((d, i) => {
            const cell = document.createElement('div');
            cell.className = `cell type-${d.type}`;
            cell.id = `cell-${i}`;
            const [r, c] = coords[i];
            cell.style.gridRow = r + 1; cell.style.gridColumn = c + 1;
            cell.innerHTML = `<div class="icon">${d.icon}</div>${d.name}`;
            board.appendChild(cell);
        });
        updateTokens();
    }

    // 更新棋子位置，確保不遮擋中央內容
    function updateTokens() {
        const pTokens = [document.getElementById('p1-token'), document.getElementById('p2-token')];
        pTokens.forEach((t, i) => {
            const cell = document.getElementById(`cell-${playerPos[i]}`);
            const tokenSize = 38; // 稍微縮小農夫，更不佔位
            const padding = 5;    // 距離邊框的留白
            
            let offsetX, offsetY;
            
            // 關鍵優化：避讓中央圖案的定位邏輯
            if (playerPos[0] === playerPos[1]) {
                // 如果兩人在同一格：P1 在左上，P2 在右下，完全避開中間的 🐷/🦆
                if (i === 0) {
                    offsetX = padding;
                    offsetY = padding;
                } else {
                    offsetX = cell.offsetWidth - tokenSize - padding;
                    offsetY = cell.offsetHeight - tokenSize - padding;
                }
            } else {
                // 如果在不同格：統一躲在右上角角落
                offsetX = cell.offsetWidth - tokenSize - padding;
                offsetY = padding;
            }
            
            t.style.left = (cell.offsetLeft + offsetX) + "px";
            t.style.top = (cell.offsetTop + offsetY) + "px";
        });
    }

    async function playGame() {
        if (isMoving) return;
        isMoving = true;
        document.getElementById('roll-btn').disabled = true;

        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerText = roll;
        
        await moveSteps(roll);
        await checkEffect();

        currentPlayer = 1 - currentPlayer;
        const card = document.getElementById('turn-card');
        card.innerText = `Player ${currentPlayer + 1}'s Turn`;
        card.className = `turn-indicator p${currentPlayer + 1}-turn`;

        isMoving = false;
        document.getElementById('roll-btn').disabled = false;
    }

    async function moveSteps(steps) {
        const dir = steps > 0 ? 1 : -1;
        for (let i = 0; i < Math.abs(steps); i++) {
            if (dir === 1 && playerPos[currentPlayer] < boardItems.length - 1) playerPos[currentPlayer]++;
            else if (dir === -1 && playerPos[currentPlayer] > 0) playerPos[currentPlayer]--;
            updateTokens();
            await new Promise(r => setTimeout(r, 400));
            if (playerPos[currentPlayer] === boardItems.length - 1) break;
        }
    }

    async function checkEffect() {
        const item = boardItems[playerPos[currentPlayer]];
        if (item.type === 'finish') {
            showWin();
        } else if (item.action === 'forward') {
            await new Promise(r => setTimeout(r, 600));
            await moveSteps(1);
            if(boardItems[playerPos[currentPlayer]].type === 'finish') showWin();
        } else if (item.action === 'back') {
            await new Promise(r => setTimeout(r, 600));
            await moveSteps(-1);
        }
    }

    function showWin() {
        document.getElementById('winner-name').innerText = `PLAYER ${currentPlayer + 1}`;
        document.getElementById('win-overlay').style.display = 'flex';
        for(let i=0; i<100; i++) createConfetti();
    }

    function createConfetti() {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        c.style.animationDuration = (Math.random() * 2 + 1) + 's';
        document.getElementById('win-overlay').appendChild(c);
        setTimeout(() => c.remove(), 3000);
    }

    function resetGame() {
        playerPos = [0, 0]; currentPlayer = 0; isMoving = false;
        document.getElementById('dice-result').innerText = "?";
        document.getElementById('roll-btn').disabled = false;
        const card = document.getElementById('turn-card');
        card.innerText = "Player 1's Turn"; card.className = "turn-indicator p1-turn";
        updateTokens();
    }

    function closeWin() {
        document.getElementById('win-overlay').style.display = 'none';
        resetGame();
    }

    init();
    window.addEventListener('resize', updateTokens);
</script>

</body>
</html>
