<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Farmers' Adventure</title>
    <style>
        :root { --p1-red: #ff4757; --p2-yellow: #f1c40f; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: #fdf6e3; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }
        
        /* 左側資訊欄 - 文字縮小 30% */
        #side-panel {
            width: 200px; /* 調整寬度以適應縮小的文字 */
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            gap: 15px;
        }

        h2 { 
            margin: 0; 
            color: #2c3e50; 
            font-size: 1.54rem; /* 原 2.2rem * 0.7 */
            line-height: 1.2;
            text-shadow: 1px 1px 0 white;
        }

        #turn-card { 
            padding: 8px 20px; 
            border-radius: 50px; 
            color: white; 
            background: var(--p1-red); 
            font-weight: bold;
            font-size: 0.91rem; /* 原 1.3rem * 0.7 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 遊戲區域 */
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 遊戲格子整體放大 20% */
        .board-wrapper { 
            background: white; 
            padding: 24px; 
            border-radius: 30px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.12); 
            border: 6px solid #d1d8e0; 
            position: relative; 
        }
        
        #game-board { 
            display: grid; 
            /* 格子大小放大 20%: 85px * 1.2 = 102px */
            grid-template-columns: repeat(7, 102px); 
            grid-template-rows: repeat(4, 102px); 
            gap: 7px; 
            position: relative; 
        }
        
        .cell { 
            background: #fff; 
            border: 2px solid #f1f2f6; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
        }
        
        .cell .icon { 
            font-size: 3.36rem; /* 圖案也隨之放大 20%: 2.8rem * 1.2 */
            z-index: 1; 
            margin-top: -15px; 
        }
        
        #center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 2;
            width: 85%;
        }
        
        .art-text {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            line-height: 1.3;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }
        
        .q-text { font-size: 1.76rem; margin-bottom: 8px; }
        .a-text { font-size: 1.44rem; color: #57606f; -webkit-text-fill-color: initial; background: none; }
        
        /* 棋子 */
        .token { 
            position: absolute; 
            z-index: 100; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            pointer-events: none; 
            width: 30px; /* 棋子微調放大 */
            height: 30px; 
            filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.3)); 
        }
        
        #controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        #win-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 1000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white; 
        }
        .win-face { width: 120px; height: 120px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="side-panel">
        <h2>Farmers'<br>Adventure</h2>
        <div id="turn-card">Player 1's Turn</div>
    </div>

    <div id="main-area">
        <div class="board-wrapper">
            <div id="center-text">
                <div class="art-text q-text">Can you see the ......?</div>
                <div class="art-text a-text">YES, I can / No, I can't.</div>
            </div>
            
            <div id="game-board">
                <div id="p1-token" class="token"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ff4757" stroke="white" stroke-width="8"/><circle cx="35" cy="40" r="8" fill="black"/><circle cx="65" cy="40" r="8" fill="black"/><path d="M30 70 Q50 85 70 70" stroke="black" stroke-width="10" fill="none"/></svg></div>
                <div id="p2-token" class="token"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#f1c40f" stroke="white" stroke-width="8"/><circle cx="35" cy="40" r="8" fill="black"/><circle cx="65" cy="40" r="8" fill="black"/><path d="M30 70 Q50 85 70 70" stroke="black" stroke-width="10" fill="none"/></svg></div>
            </div>
        </div>

        <div id="controls">
            <button onclick="playGame()" style="padding:15px 35px; font-size:1.3rem; border-radius:12px; background:#2ed573; color:white; border:none; cursor:pointer; font-weight:bold; box-shadow: 0 4px #26af5c;">🎲 ROLL</button>
            <div id="dice-result" style="width:65px; height:65px; background:white; border:3px solid #333; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.2rem; font-weight:bold;">?</div>
        </div>
    </div>

    <div id="win-overlay">
        <div id="winner-face-container" class="win-face"></div>
        <h1 id="winner-text">PLAYER WINS!</h1>
        <button onclick="location.reload()" style="padding:12px 25px; font-size:1.2rem; cursor:pointer;">Play Again</button>
    </div>

<script>
    const boardItems = [
        { name: "Start", icon: "🚩" }, { name: "Pig", icon: "🐷" }, { name: "Duck", icon: "🦆" }, 
        { name: "Cow", icon: "🐮" }, { name: "Go!", icon: "🏃" }, { name: "Dog", icon: "🐶" }, 
        { name: "Rain", icon: "🌧️" }, { name: "Sun", icon: "☀️" }, { name: "Back", icon: "🔙" }, 
        { name: "Wind", icon: "💨" }, { name: "Rainbow", icon: "🌈" }, { name: "Go!", icon: "🏃" }, 
        { name: "Pig", icon: "🐷" }, { name: "Duck", icon: "🦆" }, { name: "Back", icon: "🔙" }, 
        { name: "Dog", icon: "🐶" }, { name: "Rain", icon: "🌧️" }, { name: "Sun", icon: "☀️" }, 
        { name: "Finish", icon: "🏆" }
    ];
    const coords = [[3,0],[3,1],[3,2],[3,3],[3,4],[3,5],[3,6],[2,6],[1,6],[0,6],[0,5],[0,4],[0,3],[0,2],[0,1],[0,0],[1,0],[2,0],[2,1]];
    let playerPos = [0, 0], currentPlayer = 0, isMoving = false;

    function init() {
        const board = document.getElementById('game-board');
        boardItems.forEach((d, i) => {
            const cell = document.createElement('div');
            cell.className = 'cell'; cell.id = `cell-${i}`;
            const [r, c] = coords[i];
            cell.style.gridRow = r+1; cell.style.gridColumn = c+1;
            cell.innerHTML = `<div class="icon">${d.icon}</div>`;
            board.appendChild(cell);
        });
        updateTokens();
    }

    function updateTokens() {
        [0, 1].forEach(i => {
            const cell = document.getElementById(`cell-${playerPos[i]}`);
            const t = document.getElementById(i === 0 ? 'p1-token' : 'p2-token');
            const centerX = cell.offsetLeft + (cell.offsetWidth / 2) - (t.offsetWidth / 2);
            // 配合放大後的格子調整高度 (102px格子的置中下方)
            const baseY = cell.offsetTop + 68; 

            if (i === 0) {
                t.style.left = (centerX - 18) + "px";
                t.style.top = baseY + "px";
            } else {
                t.style.left = (centerX + 18) + "px";
                t.style.top = baseY + "px";
            }
        });
    }

    async function playGame() {
        if (isMoving) return;
        isMoving = true;
        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerText = roll;
        
        for (let i = 0; i < roll; i++) {
            if (playerPos[currentPlayer] < boardItems.length - 1) {
                playerPos[currentPlayer]++;
                updateTokens();
                await new Promise(r => setTimeout(r, 300));
            }
        }
        
        const currentTile = boardItems[playerPos[currentPlayer]];
        if (currentTile.name === "Go!" && playerPos[currentPlayer] < boardItems.length - 1) {
            await new Promise(r => setTimeout(r, 600));
            playerPos[currentPlayer]++;
            updateTokens();
        } 
        else if (currentTile.name === "Back" && playerPos[currentPlayer] > 0) {
            await new Promise(r => setTimeout(r, 600));
            playerPos[currentPlayer]--;
            updateTokens();
        }

        if (playerPos[currentPlayer] >= boardItems.length - 1) {
            showWin();
        } else {
            currentPlayer = 1 - currentPlayer;
            const card = document.getElementById('turn-card');
            card.innerText = `Player ${currentPlayer + 1}'s Turn`;
            card.style.background = currentPlayer === 0 ? "#ff4757" : "#f1c40f";
            card.style.color = currentPlayer === 0 ? "white" : "black";
            isMoving = false;
        }
    }

    function showWin() {
        const winnerSVG = document.getElementById(currentPlayer === 0 ? 'p1-token' : 'p2-token').innerHTML;
        document.getElementById('winner-face-container').innerHTML = `<svg viewBox="0 0 100 100">${winnerSVG}</svg>`;
        document.getElementById('win-overlay').style.display = 'flex';
    }

    init();
</script>
</body>
</html>
